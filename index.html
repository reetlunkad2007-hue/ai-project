<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SummarAI – Smart Text Summarizer</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google Fonts: Space Grotesk (display) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="site-header">
    <div class="logo">
      <span class="logo-icon">✦</span>
      <span class="logo-text">SummarAI</span>
    </div>
    <p class="tagline">Paste any text. Get the point instantly.</p>
  </header>

  <!-- ── MAIN APP ── -->
  <main class="app-container">

    <!-- LEFT PANEL: Input -->
    <section class="panel panel--input">
      <label class="panel-label" for="inputText">Your Text</label>
      <textarea
id="inputText"
class="text-area"
placeholder="Paste an article, essay, or any long text here..."
rows="14"
></textarea>

<div class="upload-container">

<input
type="file"
id="documentInput"
accept=".pdf,.doc,.docx,.txt"
hidden
/>

<button
class="btn-upload"
onclick="document.getElementById('documentInput').click()">
Upload Document
</button>

<span id="fileName">No file selected</span>

</div>

<div class="char-counter">
<span id="charCount">0</span> characters
</div>
    </section>

    <!-- CENTER: Controls -->
    <section class="controls">

      <!-- Summary Style Picker -->
      <div class="style-group">
        <p class="style-label">Summary style</p>

        <label class="style-option">
          <input type="radio" name="summaryStyle" value="short" checked />
          <span class="style-card">
            <span class="style-icon">⚡</span>
            <span class="style-name">Short</span>
            <span class="style-desc">2–3 sentences</span>
          </span>
        </label>

        <label class="style-option">
          <input type="radio" name="summaryStyle" value="medium" />
          <span class="style-card">
            <span class="style-icon">📄</span>
            <span class="style-name">Medium</span>
            <span class="style-desc">One paragraph</span>
          </span>
        </label>

        <label class="style-option">
          <input type="radio" name="summaryStyle" value="bullets" />
          <span class="style-card">
            <span class="style-icon">📋</span>
            <span class="style-name">Bullet Points</span>
            <span class="style-desc">Key takeaways</span>
          </span>
        </label>
      </div>

      <!-- Summarize Button -->
      <button id="summarizeBtn" class="btn-summarize" onclick="handleSummarize()">
        <span class="btn-text">Summarize →</span>
        <span class="btn-loader" hidden>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </span>
      </button>

      <!-- Clear Button -->
      <button class="btn-clear" onclick="clearAll()">Clear all</button>

    </section>

    <!-- RIGHT PANEL: Output -->
    <section class="panel panel--output">
      <label class="panel-label">Summary</label>

      <!-- Idle state (default) -->
      <div id="outputIdle" class="output-idle">
        <span class="idle-icon">✦</span>
        <p>Your summary will appear here.</p>
      </div>

      <!-- Loading state -->
      <div id="outputLoading" class="output-loading" hidden>
        <div class="spinner"></div>
      </div>

      <!-- Error state -->
      <div id="outputError" class="output-error" hidden>
        <span class="error-icon">⚠</span>
        <p id="errorMessage">Something went wrong. Please try again.</p>
      </div>

      <!-- Result state -->
      <div id="outputResult" class="output-result" hidden>
        <p id="summaryText"></p>
        <div class="result-actions">
          <button class="btn-copy" onclick="copyResult()">⎘ Copy</button>
          <button class="btn-download" onclick="downloadAsPDF()">↓ PDF</button>
          <button class="btn-download" onclick="downloadAsWord()">↓ Word</button>
          <span id="copyConfirm" class="copy-confirm" hidden>Copied!</span>
        </div>
      </div>
<!-- ==========================
     AI CHAT SECTION
========================== -->

<div id="chatSection" class="chat-section" hidden>

    <h3 class="chat-title">
        Ask AI about this Summary
    </h3>

    <div class="suggested-questions">

        <button
class="suggest-btn"
onclick="askSuggestion(this)">

What is the main idea?

</button>
        <button
class="suggest-btn"
onclick="askSuggestion(this)">

Explain this simply.

</button>

        <button
class="suggest-btn"
onclick="askSuggestion(this)">

List important points.

</button>

        <button
class="suggest-btn"
onclick="askSuggestion(this)">

Give the conclusion.

</button>
    </div>

    <div id="chatMessages" class="chat-messages">
<div
id="typingIndicator"
class="typing"
hidden>

<span></span>
<span></span>
<span></span>

</div>
        <div
id="chatPlaceholder"
class="chat-placeholder">

Generate a summary to start chatting.

</div>
    </div>

    <div class="chat-input-area">

        <textarea
id="chatInput"
rows="2"
maxlength="500"
placeholder="Generate a summary first..."
disabled
onkeydown="handleChatKey(event)">
</textarea>
<div class="chat-counter">

<span id="chatCount">

0

</span>

/

500

</div>
        <div class="chat-buttons">

            <button
id="sendChatBtn"
class="btn-send"
onclick="sendQuestion()"
disabled>

Send

</button>
            

            <button
                class="btn-clear-chat"
                onclick="clearChat()">

                Clear Chat

            </button>

        </div>

    </div>

</div>
    </section>

  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.7.2/mammoth.browser.min.js"></script>

<script src="app.js"></script>

<script src="chat.js"></script>

</body>
</html>

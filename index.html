<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SummarAI – Smart Text Summarizer</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google Fonts: Space Grotesk (display) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="site-header">
    <div class="logo">
      <span class="logo-icon">✦</span>
      <span class="logo-text">SummarAI</span>
    </div>
    <p class="tagline">Paste any text. Get the point instantly.</p>
  </header>

  <!-- ── MAIN APP ── -->
  <main class="app-container">

    <!-- LEFT PANEL: Input -->
    <section class="panel panel--input">
      <label class="panel-label" for="inputText">Your Text</label>
      <textarea
id="inputText"
class="text-area"
placeholder="Paste an article, essay, or any long text here..."
rows="14"
></textarea>
